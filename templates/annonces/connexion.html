{% extends 'annonces/base.html' %}
{% load static %}

{% block title %}Connexion - Agence Immobilière{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <i class="fas fa-sign-in-alt"></i>
                    <h1>Connexion</h1>
                    <p>Connectez-vous à votre compte</p>
                </div>
                
                <form method="post" class="auth-form">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="{{ form.username.id_for_label }}">Nom d'utilisateur</label>
                        {{ form.username }}
                    </div>
                    
                    <div class="form-group">
                        <label for="{{ form.password.id_for_label }}">Mot de passe</label>
                        {{ form.password }}
                    </div>
                    
                    <button type="submit" class="btn-primary btn-block">
                        <i class="fas fa-sign-in-alt"></i> Se connecter
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>Pas encore de compte ? <a href="{% url 'inscription' %}">Inscrivez-vous</a></p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
